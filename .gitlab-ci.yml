stages:
  - check

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"

# ── Rust: cargo check + clippy ───────────────────────────────────────────────
rust-check:
  stage: check
  tags:
    - windows
  script:
    - cd src-tauri
    - cargo check
    - cargo clippy -- -D warnings
  cache:
    key: cargo-$CI_COMMIT_REF_SLUG
    paths:
      - .cargo/registry/
      - src-tauri/target/

# ── Frontend: svelte-check + TypeScript ─────────────────────────────────────
frontend-check:
  stage: check
  tags:
    - windows
  script:
    - pnpm install
    - pnpm check
  cache:
    key: pnpm-$CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
