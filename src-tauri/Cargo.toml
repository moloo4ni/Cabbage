[dependencies]
tauri = { version = "1.5", features = ["shell-open", "fs-all", "dialog-all"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
walkdir = "2.3" # Для сканирования vault
regex = "1.9" # Для парсинга [[links]]
chrono = "0.4" # Даты коммитов
keyring = "2.3" # Для интеграции с system keychain (пароли Git)